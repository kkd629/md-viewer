<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>데모 페이지</title>
  <style>
    body { font-family: "Segoe UI", "Malgun Gothic", sans-serif; margin: 0;
           background: linear-gradient(135deg, #1b263b, #415a77); color: #e0e1dd; }
    .wrap { max-width: 720px; margin: 0 auto; padding: 48px 24px; }
    h1 { color: #ffd166; font-size: 2.2em; margin-bottom: .2em; }
    .lead { color: #a9b4c2; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 28px; }
    .card { background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12);
            border-radius: 12px; padding: 18px; }
    .card h3 { margin: 0 0 8px; color: #8ecae6; }
    button { margin-top: 24px; background: #ffd166; color: #1b263b; border: 0;
             padding: 10px 18px; border-radius: 8px; font-weight: 700; cursor: pointer; }
    #count { font-weight: 700; color: #ffd166; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🌐 HTML 데모 페이지</h1>
    <p class="lead">이 파일은 MD Viewer에서 <b>분할 모드(Ctrl+2)</b>로 열면
       왼쪽은 소스, 오른쪽은 실제 렌더링된 페이지로 동시에 볼 수 있습니다.</p>

    <div class="grid">
      <div class="card"><h3>CSS</h3><p>그라데이션 배경, 카드 레이아웃, 그리드가 그대로 적용됩니다.</p></div>
      <div class="card"><h3>JavaScript</h3><p>아래 버튼을 누르면 숫자가 올라갑니다.</p></div>
    </div>

    <button onclick="document.getElementById('count').textContent = ++c">
      클릭 수: <span id="count">0</span>
    </button>
  </div>
  <script>let c = 0;</script>
</body>
</html>
